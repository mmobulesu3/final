<!DOCTYPE html>
<html>
<head>
  <title>Advanced Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f7fb;
      padding: 40px;
      text-align: center;
    }

    .box {
      background: white;
      padding: 30px;
      width: 700px;
      margin: auto;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,.2);
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }

    .approve {
      background: green;
      color: white;
    }

    .remove {
      background: #dc3545;
      color: white;
    }

    .logout {
      background: red;
      color: white;
      float: right;
    }

    .userRow {
      background: #f9f9f9;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .codeBox {
      margin-top: 20px;
      font-weight: bold;
      color: green;
    }

    .sectionTitle {
      margin-top: 30px;
    }

    .stats {
      background: #eef3ff;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="box">

  <button class="logout" onclick="logoutAdmin()">Logout</button>

  <h2>🛠 Advanced Admin Dashboard</h2>
  <p>Approve users & generate access codes</p>

  <div class="stats">
    📩 Pending: <span id="pendingCount"></span> |
    ✅ Approved: <span id="approvedCount"></span>
  </div>

  <hr>

  <h3 class="sectionTitle">📩 Pending Requests</h3>
  <div id="requestList"></div>

  <hr>

  <h3 class="sectionTitle">✅ Approved Users</h3>
  <div id="approvedList"></div>

  <p class="codeBox" id="result"></p>

</div>

<script>
  // 🔐 ADMIN PROTECTION
  if (localStorage.getItem("adminLoggedIn") !== "true") {
    alert("❌ Admin Login Required!");
    window.location.href = "admin-login.html";
  }

  // Load Data
  let requests = JSON.parse(localStorage.getItem("requests") || "[]");
  let approvedUsers = JSON.parse(localStorage.getItem("approvedUsers") || "{}");

  // Load Everything
  function loadAll() {
    loadRequests();
    loadApproved();
    updateStats();
  }

  // 📩 Load Pending Requests
  function loadRequests() {
    let html = "";

    if (requests.length === 0) {
      html = "<p>No pending requests 🚀</p>";
    }

    requests.forEach((email, index) => {
      html += `
        <div class="userRow">
          <span>👤 ${email}</span>
          <button class="approve" onclick="approveUser(${index})">
            Approve
          </button>
        </div>
      `;
    });

    document.getElementById("requestList").innerHTML = html;
  }

  // ✅ Approve User
  function approveUser(index) {

    const email = requests[index];

    const code = "ACC-" + Math.floor(100000 + Math.random() * 900000);

    approvedUsers[email] = code;
    localStorage.setItem("approvedUsers", JSON.stringify(approvedUsers));

    requests.splice(index, 1);
    localStorage.setItem("requests", JSON.stringify(requests));

    document.getElementById("result").innerHTML =
      `✅ Approved: ${email}<br>Access Code: <b>${code}</b>`;

    loadAll();
  }

  // ✅ Load Approved Users
  function loadApproved() {
    let html = "";
    const users = Object.keys(approvedUsers);

    if (users.length === 0) {
      html = "<p>No approved users yet</p>";
    }

    users.forEach(email => {
      html += `
        <div class="userRow">
          <span>✅ ${email} → <b>${approvedUsers[email]}</b></span>
          <button class="remove" onclick="removeUser('${email}')">
            Remove
          </button>
        </div>
      `;
    });

    document.getElementById("approvedList").innerHTML = html;
  }

  // ❌ Remove Approved User
  function removeUser(email) {
    if (!confirm("Remove this user?")) return;

    delete approvedUsers[email];
    localStorage.setItem("approvedUsers", JSON.stringify(approvedUsers));

    loadAll();
  }

  // 📊 Update Stats
  function updateStats() {
    document.getElementById("pendingCount").innerText = requests.length;
    document.getElementById("approvedCount").innerText =
      Object.keys(approvedUsers).length;
  }

  // 🔓 Logout Admin
  function logoutAdmin() {
    localStorage.removeItem("adminLoggedIn");
    alert("Logged out!");
    window.location.href = "admin-login.html";
  }

  // 🚀 Initialize
  loadAll();
</script>

</body>
</html>
