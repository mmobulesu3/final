<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeotekSoft Learning - Login</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: white;
      padding: 40px 35px;
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 25px;
      color: #007bff;
      font-size: 2rem;
    }

    .login-container form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .login-container input {
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    .login-container input:focus {
      border-color: #007bff;
      box-shadow: 0 0 8px rgba(0,123,255,0.2);
    }

    .login-container .btn {
      padding: 12px;
      border-radius: 10px;
      background: #007bff;
      color: white;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-container .btn:hover {
      background: #0056b3;
    }

    .login-container .links {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
    }

    .login-container .links a {
      text-decoration: none;
      color: #007bff;
    }

    .login-container .links a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media(max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>🔐 Login</h2>
    <form action="#" method="POST">
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit" class="btn">Login</button>
    </form>
    <div class="links">
      <a href="#">Forgot Password?</a>
      <a href="#">Sign Up</a>
    </div>
  </div>

</body>
</html>
