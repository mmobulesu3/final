<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: Arial; background: #f4f7fb; text-align: center; padding: 50px; }
    .box { background: white; padding: 30px; width: 400px; margin: auto; border-radius: 12px; box-shadow: 0 6px 15px rgba(0,0,0,.2); }
    input, button { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
    button { background: #28a745; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="text" id="accessCode" placeholder="Access Code">
  <button onclick="login()">Login</button>
  <p id="msg" style="color:red;font-weight:bold;"></p>
</div>

<script>
function login() {
  const email = document.getElementById("loginEmail").value;
  const code = document.getElementById("accessCode").value;

  if (!email || !code) {
    document.getElementById("msg").innerText =
      "Enter email and access code.";
    return;
  }

  let approvedUsers = JSON.parse(localStorage.getItem("approvedUsers") || "{}");

  if (approvedUsers[email] && approvedUsers[email] === code) {
    localStorage.setItem("loggedInUser", email);
    window.location.href = "index.html";
  } else {
    document.getElementById("msg").innerText =
      "Invalid email or access code!";
  }
}
</script>

</body>
</html>
